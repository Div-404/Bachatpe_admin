<section class="page">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-12">
          <button
          class="me-3 btn-sm btn btn-my-green"
          [ngClass]="{ 'active': currentTab === 'deposit-request' || currentTab === 'balance-container/deposit-request'}"
          (click)="navigate('deposit-request')"
        >
          <span><i class="fa-regular fa-file-lines"></i></span> Request
        </button>
          <button
            class="me-3 btn-sm btn btn-my-green"
            [ngClass]="{ 'active': currentTab === 'balance-container/transaction' || currentTab === 'balance-container'
          || currentTab === 'transaction' }"
            (click)="navigate('transaction')"
          >
            <span><i class="fa-solid fa-building-columns"></i></span> Transaction
          </button>
          <button
        class="me-3 btn-sm btn btn-my-green"
        [ngClass]="{ 'active': currentTab === 'payment-by-manual' || currentTab === 'balance-container/payment-by-manual'}"
        (click)="navigate('payment-by-manual')"
      >
        <span><i class="fa-regular fa-file-lines"></i></span> History
      </button>
          <button
            class="me-3 btn-sm btn btn-my-green"
            [ngClass]="{ 'active': currentTab === 'wallet-and-ledger' || currentTab === 'balance-container/wallet-and-ledger' }"
            (click)="navigate('wallet-and-ledger')"
          >
            <span><i class="fa-regular fa-file-lines"></i></span> Ledger
          </button>
          <button
            class="me-3 btn-sm btn btn-my-green"
            [ngClass]="{ 'active': currentTab === 'withdraw-req' || currentTab === 'balance-container/withdraw-req' }"
            (click)="navigate('withdraw-req')"
          >
            <span><i class="fa-solid fa-arrow-up"></i></span> Withdraw Req
          </button>

          

        
          <hr />
        </div>
      </div>
      <div class="row">
        <router-outlet></router-outlet>
      </div>
    </div>
  </section>
