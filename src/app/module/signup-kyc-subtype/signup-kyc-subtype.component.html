<section class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12 m-auto">
        <div class="row">
          <div class="col-md-12">
            <div class="card shadow-sm">
              <div class="card-header bg-light">
                <h5 class="mb-0">Signup-KYC Subtype</h5>
              </div>
 
              <div class="card-body">
                <!-- Add / Edit form -->
                <form [formGroup]="form" (ngSubmit)="accessToAdd()">
                  <div class="row g-2 align-items-end">
                    <div class="col-md-2">
  <label class="form-label mb-1">Stage</label>
 <select class="form-select" formControlName="stageId" [disabled]="editing">
  <option [ngValue]="null" disabled>Select Stage</option>
  <option *ngFor="let opt of kycStageOptions" [ngValue]="opt.id">
    {{ opt.label }}
  </option>
</select>
  <div class="errorbody">
    <div
      class="text-danger small"
      *ngIf="f['stageId'].invalid && f['stageId'].touched"
    >
      Stage is required.
    </div>
  </div>
</div>
 
                    <div class="col-md-4">
                      <label class="form-label mb-1">Subtype Name</label>
                      <input
  type="text"
  class="form-control"
  formControlName="subType"
  placeholder="e.g. Aadhar OTP"
  [readonly]="editing"
/>
                      <div class="errorbody">
                        <div
                          class="text-danger small"
                          *ngIf="f['subType'].invalid && f['subType'].touched"
                        >
                          Subtype name is required.
                        </div>
                      </div>
                    </div>
 
                    <div class="col-md-4">
                      <label class="form-label mb-1">URL (optional)</label>
                      <input
                        type="text"
                        class="form-control"
                        formControlName="url"
                        placeholder="https://example.com/..."
                      />
                      <div class="errorbody"></div>
                    </div>
 
                   <div class="col-md-2">
  <label class="form-label mb-1">&nbsp;</label> <!-- keeps label height aligned -->
  <div class="d-flex align-items-center gap-2">
    <button
      type="submit"
      class="btn btn-success w-100"
      [disabled]="saving"
    >
      <span *ngIf="!saving && !editing">Add</span>
      <span *ngIf="!saving && editing">Update</span>

      <span *ngIf="saving">
        <span class="spinner-border spinner-border-sm me-1"></span>
        Saving...
      </span>
    </button>

    <button
      type="button"
      class="btn btn-link p-0 flex-shrink-0"
      (click)="resetFormValues()"
      title="Reset form"
    >
      <i class="fa-solid fa-arrows-rotate text-warning"></i>
    </button>
  </div>
  <div class="errorbody"></div>
</div>
                  </div>
                </form>
 
                <hr class="my-3" />
 
                <!-- Loading indicator -->
                <div *ngIf="loadingList" class="text-center py-3">
                  <div class="spinner-border spinner-border-sm"></div>
                </div>
 
                <!-- No subtypes -->
                <div
                  *ngIf="!loadingList && subtypes.length === 0"
                  class="no-data-container text-center"
                >
                <img src="assets/images/nodata1.png" class="img-fluid" width="150px">
                                                    <h5 class="no-data-text">No Data Found.</h5>
                  
                </div>
               
 
                <!-- Subtype cards -->
                <div
                  class="row g-2"
                  *ngIf="!loadingList && subtypes.length > 0"
                >
                  <div class="col-md-4" *ngFor="let s of subtypes">
                    <div class="card h-100">
                      <div class="card-header greencard">
                        <div
                          class="d-flex justify-content-between align-items-center"
                        >
                          <div>
                            <div class="fw-semibold text-white">
                             {{ getStageLabel(s?.oSubType?.oStage) || 'Unknown Stage' }}
                            </div>
                          </div>
                          <div>
                            <i
  class="fa-regular fa-pen-to-square text-white me-3"
  (click)="accessToEdit(s)"
></i>
                            <!-- <i
                              class="fa-regular fa-pen-to-square text-white me-3"
                              (click)="edit(s)"
                            ></i> -->
                            <i
  class="fa-solid fa-trash-can text-white"
  (click)="accessToDelete(s)"
></i>
                            <!-- <i
                              class="fa-solid fa-trash-can text-white"
                              (click)="confirmDelete(s)"
                            ></i> -->
                          </div>
                        </div>
                      </div>
                      <div class="card-body p-2">
                        <div class=" mb-1">
                          <span class="text-muted">Subtype: </span>
                          <span class="text-break">
                            {{ s.oSubType?.SubType || '-' }}
                          </span>
                        </div>
                        <div class="">
                          <span class="text-muted">URL: </span>
                          <span class="text-break">
                            {{ s.oSubType?.URL || '-' }}
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- /Subtype cards -->
 
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
