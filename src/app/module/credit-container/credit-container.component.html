<section class="page">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <button class="me-3 btn-sm btn btn-my-green" [ngClass]="{'active': currentTab === 'credit-request'}" (click)="navigate('credit-request')">
                    <span><i class="fa-solid fa-building-columns"></i></span> Request
                </button>
                <button class="me-3 btn-sm btn btn-my-green" [ngClass]="{'active': currentTab === 'credit-transaction'}" (click)="navigate('credit-transaction')">
                    <span><i class="fa-solid fa-building-columns"></i></span> Statement
                </button>
                <button class="me-3 btn-sm btn btn-my-green" [ngClass]="{'active': currentTab === 'credit-ledger'}" (click)="navigate('credit-ledger')">
                    <span><i class="fa-regular fa-file-lines"></i></span> Ledger
                </button>
                <button class="me-3 btn-sm btn btn-my-green" [ngClass]="{'active': currentTab === 'credit-penalty'}" (click)="navigate('credit-penalty')">
                    <span><i class="fa-regular fa-file-lines"></i></span> Penalty
                </button>
                <hr>
            </div>
        </div>
        <div class="row">
            <router-outlet></router-outlet>
        </div>
    </div>
</section>
