<!DOCTYPE html> 
<html lang="en"> 
  
<head> 
    <style type="text/css"> 
    .loader-body{
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000a8;
    z-index: 999;
    position: relative;
    }
        .loader { 
           border: 6px solid #000000;
    border-top: 6px solid #f1b435;
    border-radius: 50%;
    width: 66px;
    height: 66px;
    animation: spinloader 2s linear infinite;
        } 
  
        .loader img { 
            height: 66px; 
            width: 66px; 
            animation: spinlogo 2s linear infinite; 
        } 
  
        @keyframes spinloader { 
            0% { 
                transform: rotate(0deg); 
            } 
  
            100% { 
                transform: rotate(360deg); 
            } 
        } 
  
        @keyframes spinlogo { 
            0% { 
                transform: rotate(360deg); 
            } 
  
            100% { 
                transform: rotate(0deg); 
            } 
        } 
    </style> 
</head> 
  
<body> 
<div class="loader-body">
    <div class="loader"> 
        <img src="loader-img.png" /> 
    </div> 
    </div>
